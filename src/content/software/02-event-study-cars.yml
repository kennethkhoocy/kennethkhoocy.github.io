name: "event-study-cars"
repo_url: "https://github.com/kennethkhoocy/event-study-cars"
language: "Python"
sort_key: 2
description: "A Python replication of Thomas Kaspereit's eventstudy2 (Stata) for computing publication-quality cumulative abnormal returns (CARs) with rigorous test statistics. It implements the full event-study pipeline: trading-calendar construction, event-date mapping, the Maynes-Rumsey trade-to-trade correction for thinly traded securities, market- and factor-model estimation with Theil prediction-error standard errors, and CAR accumulation with boundary-contamination guards. It reports the standard parametric and nonparametric significance tests, including the cross-sectional t-test, the Patell and Boehmer (BMP) standardized tests, the Kolari-Pynnonen cross-correlation adjustment, the generalized sign test, and the Wilcoxon signed-rank test. The engine runs from the command line on CSV or Parquet inputs and was validated against Stata's eventstudy2 to floating-point precision across the market-model, constant-mean, market-adjusted, and raw-return specifications. It is distributed as a Claude Code skill and bundles the underlying methodology as a standalone reference."
