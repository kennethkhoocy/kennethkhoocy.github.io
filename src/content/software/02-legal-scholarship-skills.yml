name: "legal-scholarship-skills"
repo_url: "https://github.com/kennethkhoocy/legal-scholarship-skills"
language: "Claude Code and Codex"
sort_key: 2
description: >-
  A collection of eight Claude Code and Codex skills for the distinctive production pipeline of legal scholarship. Legal articles pose problems that general writing tools rarely handle well: much of the argument is carried in footnotes, citation form is governed by demanding and jurisdiction-specific manuals, authorities must never be fabricated, and even authors who draft in LaTeX eventually exchange redlined Word files with editors and co-authors. The repository covers the path from the first article plan through literature discovery, citation placement, editorial revision, and final document delivery. Each skill installs independently, while the full collection forms an end-to-end law-review toolkit.
highlights:
  - title: "Planning and structured drafting."
    description: >-
      writing-article-plans interviews the author to settle the thesis, contribution, article type, audience, and structure before prose generation begins. It decomposes each section into paragraph-sized argumentative moves, identifies the function of each paragraph, and marks claims requiring support with typed citation slots instead of invented references. The resulting plan can drive a structured LaTeX drafting process while preserving the author's control over the argument and making source requirements visible before citations are inserted.
  - title: "Literature discovery, retrieval, and reading."
    description: >-
      lit-review-orchestrator starts from a manuscript, abstract, proposal, or research question and returns a deduplicated, relevance-ranked bibliography in which every retained record has been checked against a scholarly index. download-gated-pdfs retrieves the actual PDF binary from publisher, repository, or think-tank pages that serve bot checks and HTML interstitials to non-browser clients. pdf then extracts and analyzes acquired documents, including a footnote-aware route for law-review articles that places each note near its reference point instead of appending a scrambled block of footnotes to the end. Together, the skills preserve an auditable path from discovery to source text.
  - title: "Verified citation placement and restyling."
    description: >-
      The flagship cite-placement workflow uses only references from an author's screened bibliography, verifies them against OpenAlex and Crossref, and inserts them into a new copy of a LaTeX or Word manuscript so the original remains untouched. It supports inline author-date citations and full footnotes under Bluebook, OSCOLA, Chicago, APA, or McGill conventions. Short forms such as Id., supra note, ibid, and OSCOLA cross-references are generated and repairable after manual editing. Case citations, legislation, signals, and discursive footnotes are deliberately preserved rather than mechanically transformed, and a changelog records each decision. A standalone Windows application exposes the restyling pipeline to colleagues who use neither agent.
  - title: "Word-centred editorial revision."
    description: >-
      word-docx reads the redlined Word document returned by an editor, exposes comments and tracked changes for review, prepares response-to-comments documents, and applies approved replies as tracked edits rather than flattening the revision history. latex-to-word supports the round trip for authors who draft in LaTeX: convert an editor's Word file back into workable source, revise it, and return a Word document while checking that footnotes have not silently disappeared. For final delivery, its one-way fidelity engine creates native Word tables, equations, footnotes, figures, and resolved cross-references instead of screenshots or fragile conversions.
  - title: "Document delivery and safeguards."
    description: >-
      markdown-to-pdf turns research memos, cover letters, reports, and other Markdown materials into polished PDFs, with checks that images and linked assets are genuinely present in the output. Across all eight skills, the emphasis is on traceability and safe boundaries: citations come from screened inputs, bibliographic records are verified, originals are preserved, style transformations are logged, footnote counts are checked, and editor-facing changes remain reviewable. Researchers can install the collection as a unified legal-scholarship toolkit or copy only the individual workflow they need, with installation and invocation instructions for both Claude Code and Codex.
