name: "applied-micro-skills"
repo_url: "https://github.com/kennethkhoocy/applied-micro-skills"
language: "Claude Code and Codex"
sort_key: 1
description: |-
  A collection of eighteen Claude Code and Codex skills for the full empirical applied-microeconomics research pipeline. The repository is organized around the way a paper actually develops: finding literature and data, constructing and validating research variables, estimating models, turning results into publication-ready tables and figures, delivering manuscripts in the formats journals require, and independently checking that the finished paper is supported by the underlying analysis. The common theme is verification. These are not generic prompts, but self-contained workflows, methodological guardrails, runnable tools, and documented fixes for errors that tend to surface only in serious research projects.

  The sourcing and data tools cover the beginning of that pipeline. lit-review-orchestrator reads a manuscript, abstract, or proposal, derives a search plan, combines several deep-research and scholarly-search channels, deduplicates the results, and verifies that every retained paper exists before producing a ranked bibliography. wrds provides guarded access to Wharton Research Data Services, including fail-fast authentication that avoids locking an account through automatic login retries and practical query patterns for Compustat, CRSP, FactSet, and I/B/E/S. download-gated-pdfs handles sources that appear to be PDFs in a browser but return an HTML interstitial to automated clients, using archival routes to recover the underlying document when available.

  Five skills address the methodological and operational risks of LLM-assisted classification. annotator-input-parity-check asks whether a model receives the same evidence that human coders saw, because missing inputs impose a recall ceiling that prompt engineering cannot overcome. llm-gold-bound-failure-check tests whether an apparent model failure is actually created by noisy or internally inconsistent gold labels before another paid pilot is run. llm-campaign-drift-gate uses a fresh canary to detect whether an unpinned provider alias changed during a paused, multi-day scoring campaign, preventing two different model revisions from being silently combined into one research variable. adjudication-sheets reconstructs the complete, byte-identical evidence shown to the classifier so human reviewers do not rule from truncated excerpts. asyncopenai-concurrency-httpx-pool removes the hidden connection-pool bottleneck that can cap supposedly high-concurrency batch scorers at roughly one hundred active requests.

  The econometrics and computation tools cover estimation itself. event-study-cars is a runnable Python engine for cumulative abnormal returns, validated against Stata's eventstudy2 across multiple return specifications and equipped with thin-trading correction, market and factor models, boundary guards, and the standard parametric and nonparametric significance tests. stata drives a licensed Stata installation through pystata and exchanges data with pandas in memory, making Stata analysis usable inside a broader Python workflow. pyfixest-cupy64-absorbed-regressors documents the coefficient-table and precision issues that arise when fixed-effects demeaning moves to the GPU, while pyfixest-grid-sharding shows how to divide large regression grids across workers when model estimation remains CPU-bound despite GPU acceleration.

  The presentation skills turn computed results into consistent research outputs. latex-empirical-tables builds estout-style LaTeX regression tables with an empirical-economics preamble and repairs common layout failures such as margin overflow, cramped notes, and broken multicolumn rules. stata-style-figures gives matplotlib charts the visual conventions of Stata's stcolor scheme so figures remain consistent across a paper. cite-placement inserts references from a user-supplied, verified bibliography rather than inventing authorities. latex-to-word converts LaTeX manuscripts into native Word documents while preserving tables, equations, figures, footnotes, and cross-references, and markdown-to-pdf produces polished PDFs while checking that referenced images were actually embedded.

  The flagship adversarial-empirical-review skill closes the loop before submission. It re-runs an empirical paper's pipeline in an isolated copy, compares displayed table cells with a machine-readable artifact of computed values, checks that fresh executions reproduce the committed results, and tests whether repeated runs are deterministic. Its strongest mode deletes committed intermediates and rebuilds from raw inputs, so a stale cache or hand-edited table cell cannot survive merely because the code looks plausible. Failed checks enter an adversarial drafter-reviewer-judge process, but the workflow remains fail-closed: it cannot certify a table whose provenance has not been mechanically verified. Every skill in the repository installs independently, so a researcher can use the complete toolchain or select only the relevant pieces in either Claude Code or Codex.
