  function setupModeToggle() {
    const root = document.documentElement;
    const group = document.getElementById('mode-toggle');
    if (!group) return;
    const buttons = group.querySelectorAll('.mode-btn');

    function paint() {
      const mode = root.classList.contains('dark') ? 'dark' : 'light';
      buttons.forEach((b) => b.setAttribute('aria-pressed', b.dataset.mode === mode ? 'true' : 'false'));
    }

    buttons.forEach((b) => {
      b.addEventListener('click', () => {
        const mode = b.dataset.mode;
        if (mode === 'dark') {
          root.classList.add('dark');
          try { localStorage.setItem('theme', 'dark'); } catch (_) {}
        } else {
          root.classList.remove('dark');
          try { localStorage.setItem('theme', 'light'); } catch (_) {}
        }
        paint();
      });
    });

    paint();
  }

  // astro:page-load fires on initial navigation AND after every ClientRouter
  // swap, so the toggle re-binds itself to the freshly-swapped-in buttons.
  document.addEventListener('astro:page-load', setupModeToggle);
